info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/login"
  body:
    type: json
    data: |-
      {
       "email": "admin@example.com",
        "password" : "password123"
      }
  auth: inherit

runtime:
  variables:
    - name: base_url
      value: http://localhost:8000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
